<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0a0a0b" />
  <meta name="description" content="UniRead — leitor universal local de arquivos para PWA." />
  <meta http-equiv="refresh" content="0; url=app.html" />
  <title>UniRead — Leitor Universal</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon-192.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      min-height: 100dvh;
      margin: 0;
      display: grid;
      place-items: center;
      font-family: 'Syne', ui-sans-serif, system-ui, sans-serif;
      color: #e8e8f0;
      background-color: #0a0a0b;
      background-image: radial-gradient(ellipse 70% 45% at 12% 0%, rgba(201, 168, 76, 0.06) 0%, transparent 55%);
      -webkit-font-smoothing: antialiased;
    }
    main {
      width: min(92vw, 480px);
      padding: 32px;
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 26px;
      background: rgba(16, 16, 20, 0.88);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
      text-align: center;
      backdrop-filter: blur(28px);
    }
    .mark {
      width: 56px;
      height: 56px;
      margin: 0 auto 20px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 1.25rem;
      font-weight: 400;
      color: #0a0a0b;
      background: #c9a84c;
      box-shadow: 0 6px 24px rgba(201, 168, 76, 0.3);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -0.04em;
    }
    p {
      margin: 0 0 24px;
      color: #7070808;
      color: #888890;
      line-height: 1.6;
      font-size: 0.9rem;
    }
    a {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 22px;
      border-radius: 10px;
      color: #0a0a0b;
      background: #c9a84c;
      text-decoration: none;
      font-weight: 800;
      font-size: 0.88rem;
      letter-spacing: 0.02em;
    }
    a:hover { background: #e2c06a; }
  </style>
  <script>window.location.replace('./app.html');</script>
</head>
<body>
  <main>
    <div class="mark">Ur</div>
    <h1>Carregando UniRead</h1>
    <p>Redirecionando para o leitor universal.</p>
    <a href="app.html">Abrir agora</a>
  </main>
</body>
</html>
